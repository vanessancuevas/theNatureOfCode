<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-gamut" content="p3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jellyfish</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  canvas { display: block; border-radius: 50%; }
  #nav-dots {
    position: fixed; bottom: 18px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px; pointer-events: none;
  }
  .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(100,180,255,0.25);
    transition: background 0.4s;
  }
  .dot.active { background: rgba(100,180,255,0.75); }
</style>
</head>
<body>
<div id="nav-dots">
  <span class="dot" id="d0"></span>
  <span class="dot" id="d1"></span>
  <span class="dot" id="d2"></span>
</div>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
<script>
  const SCRIPTS = ['jellyfish-ghost.js', 'jellyfish-phantom.js', 'jellyfish-comb.js'];

  // Index lives in the hash — URL never changes, so iOS standalone mode is never broken
  let idx = parseInt(location.hash.replace('#', ''));
  if (isNaN(idx) || idx < 0 || idx > 2) idx = 0;

  document.getElementById('d' + idx).classList.add('active');

  // Dynamically load the active jellyfish sketch
  const s = document.createElement('script');
  s.src = SCRIPTS[idx];
  document.body.appendChild(s);

  function go(i) {
    const next = ((i % 3) + 3) % 3;
    location.hash = next;   // same document — iOS stays in standalone mode
    location.reload();
  }

  let wheelAccum = 0;
  let touchStartX = null;

  window.addEventListener('wheel', e => {
    e.preventDefault();
    wheelAccum += e.deltaX;
    if (wheelAccum > 80)  { go(idx + 1); wheelAccum = 0; }
    if (wheelAccum < -80) { go(idx - 1); wheelAccum = 0; }
  }, { passive: false });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') { e.preventDefault(); go(idx + 1); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); go(idx - 1); }
  }, true);

  window.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  window.addEventListener('touchend', e => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (dx < -50) go(idx + 1);
    if (dx >  50) go(idx - 1);
    touchStartX = null;
  }, { passive: true });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-gamut" content="p3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Jellyfish Gallery</title>
<script>window.location.replace('jellyfish-ghost.html');</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #stage {
    position: relative;
    width: 100vmin;
    height: 100vmin;
  }

  iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: #000;
    border-radius: 50%;
    transition: opacity 0.6s ease;
  }

  iframe.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Dot indicators */
  #dots {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    pointer-events: none;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(100, 180, 255, 0.25);
    transition: background 0.4s;
  }

  .dot.active {
    background: rgba(100, 180, 255, 0.75);
  }
</style>
</head>
<body>

<div id="stage">
  <iframe id="frame" src="jellyfish-ghost.html"></iframe>
</div>

<div id="dots"></div>

<script>
  const jellies = [
    { src: 'jellyfish-ghost.html',   label: 'Moon Jellyfish'  },
    { src: 'jellyfish-phantom.html', label: 'Phantom Jellyfish' },
    { src: 'jellyfish-comb.html',    label: 'Comb Jellyfish'  },
  ];

  let current = 0;
  const frame = document.getElementById('frame');
  const dotsEl = document.getElementById('dots');

  // Build dots
  jellies.forEach((_, i) => {
    let d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });

  function goTo(idx) {
    if (idx === current) return;
    current = ((idx % jellies.length) + jellies.length) % jellies.length;
    frame.classList.add('hidden');
    setTimeout(() => {
      frame.src = jellies[current].src;
      frame.classList.remove('hidden');
    }, 300);
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
    window.focus(); // reclaim keyboard focus from iframe
  }

  // Refocus parent whenever iframe loads so arrow keys keep working
  frame.addEventListener('load', () => window.focus());

  // Trackpad / mouse wheel swipe (horizontal)
  let wheelAccum = 0;
  const SWIPE_THRESHOLD = 80;

  window.addEventListener('wheel', (e) => {
    e.preventDefault();
    wheelAccum += e.deltaX;
    if (wheelAccum > SWIPE_THRESHOLD) {
      goTo(current + 1);
      wheelAccum = 0;
    } else if (wheelAccum < -SWIPE_THRESHOLD) {
      goTo(current - 1);
      wheelAccum = 0;
    }
  }, { passive: false });

  // Touch swipe
  let touchStartX = null;
  const TOUCH_THRESHOLD = 50;

  window.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  window.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    let dx = e.changedTouches[0].clientX - touchStartX;
    if (dx < -TOUCH_THRESHOLD) goTo(current + 1);
    else if (dx > TOUCH_THRESHOLD) goTo(current - 1);
    touchStartX = null;
  }, { passive: true });

  // Keyboard arrows (handy for desktop testing)
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') goTo(current + 1);
    if (e.key === 'ArrowLeft')  goTo(current - 1);
  });
</script>
</body>
</html>
